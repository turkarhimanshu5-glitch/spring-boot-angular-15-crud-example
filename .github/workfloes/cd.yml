name: CD - Build, Push & Deploy

on:
  push:
    branches: [develop]        # auto-deploy to dev
  release:
    types: [published]          # auto-deploy to prod
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [dev, staging, prod]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./<backend-folder>
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sb-backend:${{ steps.meta.outputs.tag }}
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./<frontend-folder>
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sb-frontend:${{ steps.meta.outputs.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ENV=${{ github.event.inputs.environment || 'dev' }}
            case "$ENV" in
              dev) PORT=8081 ;;
              staging) PORT=8082 ;;
              prod) PORT=8083 ;;
            esac
            cd /opt/apps/spring-angular-$ENV
            export IMAGE_TAG=${{ needs.build-and-push.outputs.tag }}
            docker compose --env-file .env.$ENV pull
            docker compose --env-file .env.$ENV up -d
            /opt/apps/scripts/health-check.sh "$ENV" "$PORT" || /opt/apps/scripts/rollback.sh "$ENV"
